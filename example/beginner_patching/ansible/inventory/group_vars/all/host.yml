---
configure_public_yum_repo: false
configure_epel_repo: false

configure_motd: false

autostartup_service: true

configure_hugepages_by: memory

# disable hugepages on small systems
# don't forget to enable use_large_pages in oracle parameter
# size_in_gb_hugepages: 2
size_in_gb_hugepages: 0


configure_host_disks: true

host_fs_layout:
  - vgname: ol
    state: present
    filesystem:
      - {mntp: swap, lvname: lvswap, lvsize: 17G, fstype: swap}
      # - {mntp: /, lvname: "ol-root", lvsize: 15G, fstype: xfs}
      - {mntp: /sw, lvname: lvsw, lvsize: 15G, fstype: xfs}
      - {mntp: /u01, lvname: lvorabase, lvsize: 15G, fstype: xfs}
      - {mntp: /u02, lvname: lvoradata, lvsize: 10G, fstype: xfs, fsopts: "-m reflink=1 -m crc=1"}
    disk:
      - {device: /dev/sda, pvname: /dev/sda3}
